<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; style-src 'self' https://cdn.jsdelivr.net; img-src * data:; script-src 'self'; connect-src https://worldcup26.ir;">
<meta name="theme-color" content="#58a6ff">
<meta name="description" content="Interaktiver FIFA WM 2026 Turnierplan – Gruppenphase, K.o.-Baum, Live-Scores, offline-fähig (PWA). 48 Teams, 12 Gruppen, 6 K.o.-Runden. Self-hosted, kein Framework.">
<meta name="author" content="Daniel Lienhard">
<meta name="application-name" content="hAI.WMPlan">
<meta name="keywords" content="WM 2026, FIFA World Cup 2026, Turnierplan, Gruppenphase, K.o.-Baum, Fussball, Self-hosted">
<!-- Open Graph -->
<meta property="og:title" content="hAI.WMPlan – FIFA WM 2026 Turnierplan">
<meta property="og:description" content="Interaktiver WM-2026-Turnierplan: 48 Teams, 12 Gruppen, K.o.-Baum, Live-Scores, PWA.">
<meta property="og:image" content="logo.png">
<meta property="og:type" content="website">
<meta property="og:locale" content="de_DE">
<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="hAI.WMPlan – FIFA WM 2026">
<meta name="twitter:description" content="Interaktiver WM-Turnierplan mit Live-Scores und K.o.-Baum.">
<meta name="twitter:image" content="logo.png">
<title>WM 2026 – Turnierplan | hAI.WMPlan</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"
  integrity="sha384-LxnbKv8aP7/GOl1UQWCGmJFCBPBqUbFmYXarHjByY4Qo+ETH8JtVdcNnXqrruXi"
  crossorigin="anonymous">
<!-- Theme-FOUC verhindern -->
<script>
  (function(){
    const t = localStorage.getItem('wm2026_theme') || 'dark';
    document.documentElement.dataset.theme = t;
    document.body && (document.body.dataset.theme = t);
  })();
</script>
</head>
<body>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h3 id="modalTitle">Alle Ergebnisse löschen?</h3>
    <p>Diese Aktion kann nicht rückgängig gemacht werden.</p>
    <div class="modal-btns">
      <button class="btn btn-cancel" id="modalCancel">Abbrechen</button>
      <button class="btn btn-danger" id="modalConfirm">Ja, löschen</button>
    </div>
  </div>
</div>

<!-- PWA Install-Banner -->
<div id="installBanner" aria-live="polite">
  <span>📲 App installieren – auch offline nutzbar</span>
  <button id="installBtn">Installieren</button>
  <button class="close-banner" id="closeBanner" aria-label="Banner schließen">✕</button>
</div>

<header>
  <img src="logo.png" alt="hAI.WMPlan Logo" class="logo">
  <h1>FIFA WM 2026 – Turnierplan</h1>
  <span class="badge">Kanada · Mexiko · USA</span>
  <div class="live-badge" id="liveBadge" title="Live-Daten werden automatisch abgerufen">
    <span class="live-dot"></span> LIVE
  </div>
  <button class="btn-theme" id="themeBtn" aria-label="Theme wechseln">🌙</button>
</header>

<nav class="tabs" role="tablist" aria-label="Turnierphase">
  <button class="tab active" data-tab="groups" role="tab" aria-selected="true">Gruppenphase</button>
  <button class="tab" data-tab="ko" role="tab" aria-selected="false">K.o.-Phase</button>
</nav>

<main id="app" role="main"></main>
<div class="api-status" id="apiStatus" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
