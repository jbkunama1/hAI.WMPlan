server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Caching-Strategie:
    # - app.js / style.css: kein Cache (immer aktuell)
    # - sw.js: kein Cache (Service Worker muss immer frisch sein!)
    # - statische Assets (logo, fonts): 30 Tage
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options nosniff;
    }
    location = /sw.js {
        add_header Cache-Control "no-store";
        add_header Service-Worker-Allowed "/";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA-Fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy no-referrer;
    }

    # Gesundheits-Check für Docker/Portainer
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
